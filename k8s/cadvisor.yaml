apiVersion: v1
kind: Pod
metadata:
  name: cadvisor
  namespace: monitoring
  labels:
    app: cadvisor
spec:
  hostNetwork: true
  containers:
    - name: cadvisor
      image: gcr.io/cadvisor/cadvisor:latest
      ports:
        - containerPort: 8080
      volumeMounts:
        - name: rootfs
          mountPath: /rootfs
        - name: var-run
          mountPath: /var/run
        - name: sys
          mountPath: /sys
        - name: docker
          mountPath: /var/lib/docker
  volumes:
    - name: rootfs
      hostPath:
        path: /
    - name: var-run
      hostPath:
        path: /var/run
    - name: sys
      hostPath:
        path: /sys
    - name: docker
      hostPath:
        path: /var/lib/docker
---
apiVersion: v1
kind: Service
metadata:
  name: cadvisor
  namespace: monitoring
spec:
  selector:
    app: cadvisor
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080