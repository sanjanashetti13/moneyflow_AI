apiVersion: apps/v1
kind: Deployment
metadata:
  name: moneyflow-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: moneyflow-frontend
  template:
    metadata:
      labels:
        app: moneyflow-frontend
    spec:
      containers:
      - name: moneyflow-frontend
        image: pavansanjana/moneyflow-frontend:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: moneyflow-frontend-service
spec:
  type: NodePort
  selector:
    app: moneyflow-frontend
  ports:
    - port: 5173
      targetPort: 5173
      nodePort: 30080
