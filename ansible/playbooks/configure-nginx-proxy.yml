- name: Configure Nginx Reverse Proxy for Money Flow
  hosts: webserver
  become: yes
  gather_facts: no
  
  vars:
    app_user: moneyflow
    app_dir: /var/www/money-flow
    frontend_dir: "{{ app_dir }}/frontend"
    backend_port: 5000
    server_ip: "localhost"  # WSL Ubuntu IP
    
  tasks:
    - name: Copy Nginx site configuration
      template:
        src: ../templates/nginx-money-flow.conf.j2
        dest: /etc/nginx/sites-available/money-flow
        mode: '0644'
      tags: ['nginx']

    - name: Remove default Nginx site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent
      tags: ['nginx']

    - name: Enable Money Flow site
      file:
        src: /etc/nginx/sites-available/money-flow
        dest: /etc/nginx/sites-enabled/money-flow
        state: link
      tags: ['nginx']

    - name: Test Nginx configuration
      command: nginx -t
      register: nginx_test
      changed_when: false
      tags: ['nginx']

    - name: Display Nginx test result
      debug:
        msg: "{{ nginx_test.stderr_lines }}"
      tags: ['nginx']

    - name: Reload Nginx
      systemd:
        name: nginx
        state: reloaded
      tags: ['nginx']

    - name: Wait for Nginx to reload
      wait_for:
        port: 80
        delay: 1
        timeout: 10
      tags: ['verify']

    - name: Test frontend accessibility
      uri:
        url: "http://{{ server_ip }}/"
        return_content: no
        status_code: 200
      register: frontend_test
      ignore_errors: yes
      tags: ['verify']

    - name: Display frontend test result
      debug:
        msg: "Frontend is {{ 'accessible' if frontend_test.status == 200 else 'not accessible' }}"
      tags: ['verify']
